<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page de test</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f3f7ff, #eefcf7);
    }
    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 420px;
      width: calc(100% - 2rem);
    }
    h1 { margin-top: 0; }
    button {
      border: 0;
      padding: .7rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      background: #0f766e;
      color: white;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Page de test</h1>
    <p>Si tu vois cette page, le projet est prêt pour les prochains tests.</p>
    <button id="testBtn">Cliquer</button>
  </main>

  <script>
    document.getElementById('testBtn').addEventListener('click', function () {
      alert('Test OK');
    });
  </script>
</body>
</html>
